<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug API - TCGtrade</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #333; }
        .error { color: #f00; }
        .success { color: #0f0; }
        .warning { color: #ff0; }
        button { padding: 10px 20px; margin: 5px; }
        pre { background: #000; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 Debug API - TCGtrade</h1>
    
    <div class="test">
        <h2>1. Test Función Proxy</h2>
        <button onclick="testProxy()">Test Proxy Function</button>
        <div id="proxy-result"></div>
    </div>

    <div class="test">
        <h2>2. Test API Directa (sin proxy)</h2>
        <button onclick="testDirectAPI()">Test Direct API</button>
        <div id="direct-result"></div>
    </div>

    <div class="test">
        <h2>3. Test Headers y Response</h2>
        <button onclick="testHeaders()">Test Headers</button>
        <div id="headers-result"></div>
    </div>

    <div class="test">
        <h2>4. Test Elementos DOM</h2>
        <button onclick="testDOM()">Test DOM Elements</button>
        <div id="dom-result"></div>
    </div>

    <div class="test">
        <h2>5. Logs en Tiempo Real</h2>
        <div id="live-logs" style="height: 300px; overflow-y: auto; background: #000; padding: 10px;"></div>
        <button onclick="clearLogs()">Limpiar Logs</button>
    </div>

    <script>
        const logsDiv = document.getElementById('live-logs');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#f00' : type === 'success' ? '#0f0' : type === 'warning' ? '#ff0' : '#0af';
            logsDiv.innerHTML += `<div style="color: ${color}">[${timestamp}] ${message}</div>`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(message);
        }

        function clearLogs() {
            logsDiv.innerHTML = '';
        }

        async function testProxy() {
            const result = document.getElementById('proxy-result');
            result.innerHTML = '<div class="warning">Testing proxy function...</div>';
            
            log('🔧 Testing proxy function', 'info');
            
            try {
                const response = await fetch('/api/pokemontcg/cards?pageSize=1');
                
                log(`📡 Proxy response status: ${response.status}`, 'info');
                log(`📡 Proxy response headers: ${JSON.stringify(Object.fromEntries(response.headers.entries()))}`, 'info');
                
                // Leer como texto primero para ver qué estamos recibiendo
                const responseText = await response.text();
                log(`📄 Raw response length: ${responseText.length} characters`, 'info');
                log(`📄 Raw response start: ${responseText.substring(0, 200)}...`, 'info');
                
                // Intentar parsear como JSON
                let data;
                try {
                    data = JSON.parse(responseText);
                    log('✅ JSON parsing successful', 'success');
                } catch (jsonError) {
                    log(`❌ JSON parsing failed: ${jsonError.message}`, 'error');
                    result.innerHTML = `<div class="error">JSON Error: ${jsonError.message}<br>Raw response: <pre>${responseText}</pre></div>`;
                    return;
                }
                
                result.innerHTML = `<div class="success">✅ Proxy works!<br>Cards found: ${data.data?.length || 0}<br>Total: ${data.totalCount || 'N/A'}</div>`;
                log(`✅ Proxy test successful: ${data.data?.length || 0} cards`, 'success');
                
            } catch (error) {
                log(`❌ Proxy test failed: ${error.message}`, 'error');
                result.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        async function testDirectAPI() {
            const result = document.getElementById('direct-result');
            result.innerHTML = '<div class="warning">Testing direct API...</div>';
            
            log('🌐 Testing direct API call', 'info');
            
            try {
                const response = await fetch('https://api.pokemontcg.io/v2/cards?pageSize=1');
                
                log(`📡 Direct API response status: ${response.status}`, 'info');
                
                const data = await response.json();
                result.innerHTML = `<div class="success">✅ Direct API works!<br>Cards: ${data.data?.length || 0}</div>`;
                log('✅ Direct API test successful', 'success');
                
            } catch (error) {
                log(`❌ Direct API test failed: ${error.message}`, 'error');
                result.innerHTML = `<div class="error">❌ Direct API Error: ${error.message}</div>`;
            }
        }

        async function testHeaders() {
            const result = document.getElementById('headers-result');
            result.innerHTML = '<div class="warning">Testing headers...</div>';
            
            log('📋 Testing headers and response details', 'info');
            
            try {
                const response = await fetch('/api/pokemontcg/cards?q=name:pikachu&pageSize=3', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const headers = Object.fromEntries(response.headers.entries());
                log(`📋 Response headers: ${JSON.stringify(headers, null, 2)}`, 'info');
                
                const contentType = response.headers.get('content-type');
                log(`📋 Content-Type: ${contentType}`, 'info');
                
                if (!contentType || !contentType.includes('application/json')) {
                    log('⚠️ Warning: Response is not JSON!', 'warning');
                }
                
                // Leer la respuesta completa
                const fullResponse = await response.text();
                log(`📄 Full response length: ${fullResponse.length}`, 'info');
                
                if (fullResponse.length === 0) {
                    result.innerHTML = '<div class="error">❌ Empty response!</div>';
                    return;
                }
                
                // Verificar si es JSON válido
                try {
                    const data = JSON.parse(fullResponse);
                    result.innerHTML = `<div class="success">✅ Valid JSON response<br>Length: ${fullResponse.length} chars<br>Cards: ${data.data?.length || 0}</div>`;
                } catch (e) {
                    result.innerHTML = `<div class="error">❌ Invalid JSON<br>Response: <pre>${fullResponse.substring(0, 500)}...</pre></div>`;
                }
                
            } catch (error) {
                log(`❌ Headers test failed: ${error.message}`, 'error');
                result.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        async function testDOM() {
            const result = document.getElementById('dom-result');
            
            log('🔍 Testing DOM elements', 'info');
            
            // Simular que estamos en la página principal
            const elements = [
                'searchInput',
                'homeLink',
                'loginLink',
                'myCardsLink',
                'profileLink',
                'cardsContainer'
            ];
            
            let html = '<h3>DOM Elements Test:</h3>';
            
            elements.forEach(id => {
                const element = document.getElementById(id);
                const exists = element !== null;
                const color = exists ? 'success' : 'error';
                html += `<div class="${color}">${id}: ${exists ? '✅ Found' : '❌ Not found'}</div>`;
                log(`DOM ${id}: ${exists ? 'Found' : 'Not found'}`, exists ? 'success' : 'error');
            });
            
            // Test iframe para la página principal
            html += '<br><h4>Testing main page elements via iframe:</h4>';
            html += '<iframe src="/" width="1" height="1" style="visibility: hidden;" onload="checkMainPageElements(this)"></iframe>';
            html += '<div id="iframe-results">Loading main page...</div>';
            
            result.innerHTML = html;
        }

        function checkMainPageElements(iframe) {
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            const iframeResultsDiv = document.getElementById('iframe-results');
            
            const elements = ['searchInput', 'homeLink', 'loginLink', 'myCardsLink', 'profileLink'];
            let html = '';
            
            elements.forEach(id => {
                const element = iframeDoc.getElementById(id);
                const exists = element !== null;
                const color = exists ? 'success' : 'error';
                html += `<div class="${color}">Main page ${id}: ${exists ? '✅ Found' : '❌ Not found'}</div>`;
                log(`Main page ${id}: ${exists ? 'Found' : 'Not found'}`, exists ? 'success' : 'error');
            });
            
            iframeResultsDiv.innerHTML = html;
        }

        // Auto-start logging
        log('🔧 Debug page loaded', 'info');
        log('Ready for testing...', 'info');
    </script>
</body>
</html>
