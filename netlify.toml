# netlify.toml
[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/api/pokemontcg/*"
  to = "/.netlify/functions/pokemon-proxy/:splat"
  status = 200

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["node-fetch"]
  timeout = 60
