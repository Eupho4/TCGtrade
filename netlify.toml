# netlify.toml
[build]
  functions = "netlify/functions"
  command = "npm install --prefix netlify/functions" # Asegúrate de que esta línea no tenga espacios extra al inicio

[[redirects]]
  from = "/api/pokemontcg/*"
  to = "/.netlify/functions/pokemon-proxy/:splat"
  status = 200

[[plugins]]
package = "@netlify/plugin-functions-install-core"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["node-fetch"]
  timeout = 60
