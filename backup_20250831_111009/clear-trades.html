<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpiar Intercambios</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-4">🧹 Limpiador de Intercambios</h1>
        
        <div id="status" class="mb-4 p-4 bg-gray-100 rounded">
            <p class="font-semibold">Estado:</p>
            <div id="statusMessage"></div>
        </div>
        
        <div class="space-y-4">
            <button onclick="showTrades()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                📋 Ver Todos los Intercambios
            </button>
            
            <button onclick="clearAllTrades()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                🗑️ Borrar TODOS los Intercambios
            </button>
            
            <button onclick="clearUserTrades()" class="bg-orange-500 text-white px-4 py-2 rounded hover:bg-orange-600">
                👤 Borrar Solo Mis Intercambios
            </button>
        </div>
        
        <div id="tradesList" class="mt-6"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyCkgz6_Zpu0VOW6GgJxOxd9QlVccsBXnog",
            authDomain: "tcgtrade-7ba27.firebaseapp.com",
            projectId: "tcgtrade-7ba27",
            storageBucket: "tcgtrade-7ba27.firebasestorage.app",
            messagingSenderId: "207150886257",
            appId: "1:207150886257:web:26edebbeb7df7a1d935ad0",
            measurementId: "G-QHGQFG5QKF"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let currentUser = null;
        
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const status = document.getElementById('statusMessage');
            if (user) {
                status.innerHTML = `✅ Conectado como: ${user.email} (UID: ${user.uid})`;
            } else {
                status.innerHTML = `⚠️ No hay usuario conectado`;
            }
        });
        
        window.showTrades = function() {
            const list = document.getElementById('tradesList');
            let html = '<h3 class="font-bold text-lg mb-2">📦 Intercambios Encontrados:</h3>';
            let totalTrades = 0;
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('userTrades_')) {
                    const trades = JSON.parse(localStorage.getItem(key) || '[]');
                    const userId = key.replace('userTrades_', '');
                    const isCurrentUser = currentUser && userId === currentUser.uid;
                    
                    html += `
                        <div class="mb-4 p-3 border rounded ${isCurrentUser ? 'bg-green-50 border-green-300' : 'bg-gray-50'}">
                            <p class="font-semibold">
                                ${isCurrentUser ? '👤 TUS INTERCAMBIOS' : '👥 Otro Usuario'} 
                                (${key})
                            </p>
                            <p>Cantidad: ${trades.length} intercambios</p>
                            <ul class="mt-2 space-y-1">
                    `;
                    
                    trades.forEach(trade => {
                        html += `<li class="text-sm">- ${trade.title || 'Sin título'} (${trade.user || 'Sin usuario'})</li>`;
                        totalTrades++;
                    });
                    
                    html += '</ul></div>';
                }
            }
            
            html += `<p class="mt-4 font-bold">Total: ${totalTrades} intercambios</p>`;
            list.innerHTML = html;
        }
        
        window.clearAllTrades = function() {
            if (!confirm('⚠️ ¿Estás seguro de que quieres borrar TODOS los intercambios de TODOS los usuarios?\n\nEsta acción no se puede deshacer.')) {
                return;
            }
            
            let keysToDelete = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('userTrades_')) {
                    keysToDelete.push(key);
                }
            }
            
            keysToDelete.forEach(key => {
                localStorage.removeItem(key);
                console.log('Borrado:', key);
            });
            
            alert(`✅ Se han borrado ${keysToDelete.length} colecciones de intercambios`);
            showTrades();
        }
        
        window.clearUserTrades = function() {
            if (!currentUser) {
                alert('⚠️ Debes iniciar sesión primero');
                return;
            }
            
            if (!confirm('⚠️ ¿Estás seguro de que quieres borrar TUS intercambios?\n\nEsta acción no se puede deshacer.')) {
                return;
            }
            
            const userKey = `userTrades_${currentUser.uid}`;
            const trades = JSON.parse(localStorage.getItem(userKey) || '[]');
            
            localStorage.removeItem(userKey);
            alert(`✅ Se han borrado ${trades.length} intercambios tuyos`);
            showTrades();
        }
        
        // Mostrar intercambios al cargar
        setTimeout(showTrades, 1000);
    </script>
</body>
</html>
