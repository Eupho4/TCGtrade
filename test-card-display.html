<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Visualización de Cartas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-primary {
            background: linear-gradient(135deg, #f97316, #fb923c);
            color: white;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #ea580c, #f97316);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-6">Test de Búsqueda de Cartas</h1>
        
        <div class="mb-4">
            <input type="text" id="searchInput" 
                   class="w-full px-4 py-2 border rounded-lg" 
                   placeholder="Buscar cartas (ej: pikachu)" />
            <button onclick="searchCards()" 
                    class="btn-primary px-6 py-2 mt-2 rounded-lg">
                Buscar
            </button>
        </div>
        
        <div id="loading" class="hidden text-center py-4">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-orange-500"></div>
            <p class="mt-2">Buscando cartas...</p>
        </div>
        
        <div id="results" class="bg-white rounded-lg shadow-lg p-4">
            <!-- Aquí se mostrarán los resultados -->
        </div>
    </div>

    <script>
        async function searchCards() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;
            
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            loading.classList.remove('hidden');
            results.innerHTML = '';
            
            try {
                const response = await fetch(`/api/pokemontcg/cards?q=name:*${query}*&pageSize=10`);
                const data = await response.json();
                const cards = data.data || [];
                
                if (cards.length > 0) {
                    cards.forEach(card => {
                        const row = document.createElement('div');
                        row.className = 'relative flex items-center gap-3 p-3 hover:bg-gray-50 h-16 overflow-visible border-b';
                        
                        // Icono de imagen
                        const imgWrapper = document.createElement('div');
                        imgWrapper.className = 'w-10 h-10 flex items-center justify-center bg-transparent rounded cursor-pointer absolute left-3 top-1/2 -translate-y-1/2 z-10';
                        imgWrapper.title = 'Click para ver imagen';
                        imgWrapper.innerHTML = '<span class="text-xl">🎴</span>';
                        
                        // Overlay para imagen expandida
                        const imgOverlay = document.createElement('div');
                        imgOverlay.className = 'hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center';
                        imgOverlay.style.position = 'fixed';
                        imgOverlay.addEventListener('click', () => { 
                            imgOverlay.classList.add('hidden');
                            document.body.style.overflow = 'auto';
                        });
                        
                        const imgEl = document.createElement('img');
                        imgEl.src = (card.images?.large || card.images?.small) || 'https://placehold.co/400x550/a0aec0/ffffff?text=Sin+imagen';
                        imgEl.alt = card.name || 'Carta';
                        imgEl.className = 'max-w-[90vw] max-h-[90vh] object-contain rounded-lg shadow-2xl';
                        
                        imgOverlay.appendChild(imgEl);
                        document.body.appendChild(imgOverlay);
                        
                        imgWrapper.addEventListener('click', (e) => { 
                            e.stopPropagation();
                            imgOverlay.classList.remove('hidden');
                            document.body.style.overflow = 'hidden';
                        });
                        
                        // Información de la carta
                        const info = document.createElement('div');
                        info.className = 'flex-1 min-w-0 pl-16'; // Reducido de pl-32 a pl-16
                        info.innerHTML = `
                            <div class="flex items-center justify-between">
                                <div class="truncate">
                                    <div class="font-semibold text-gray-900 truncate">${card.name || 'Nombre no disponible'}</div>
                                    <div class="text-xs text-gray-600 truncate">Set: ${card.set?.name || 'N/A'} · Serie: ${card.set?.series || 'N/A'} · Nº: ${card.number || 'N/A'}</div>
                                </div>
                                <button class="btn-primary px-3 py-1.5 rounded text-xs">
                                    Ver Detalles
                                </button>
                            </div>
                        `;
                        
                        row.appendChild(imgWrapper);
                        row.appendChild(info);
                        results.appendChild(row);
                    });
                } else {
                    results.innerHTML = '<p class="text-center text-gray-500 py-4">No se encontraron cartas</p>';
                }
            } catch (error) {
                results.innerHTML = `<p class="text-center text-red-500 py-4">Error: ${error.message}</p>`;
            } finally {
                loading.classList.add('hidden');
            }
        }
        
        // Permitir búsqueda con Enter
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchCards();
        });
    </script>
</body>
</html>
