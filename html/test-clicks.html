<!DOCTYPE html>
<html>
<head>
    <title>Test Clicks</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-btn { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .test-btn:hover { background: #0056b3; }
        .result { margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Test de Clicks</h1>
    
    <div>
        <button class="test-btn" onclick="testHomeLink()">Test Home Link</button>
        <button class="test-btn" onclick="testStartTrading()">Test Start Trading</button>
        <button class="test-btn" onclick="testLoginLink()">Test Login Link</button>
    </div>
    
    <div id="results" class="result"></div>
    
    <script>
        function log(message) {
            const results = document.getElementById('results');
            results.innerHTML += '<p>' + message + '</p>';
            console.log(message);
        }
        
        function testHomeLink() {
            log('🔍 Probando homeLink...');
            const homeLink = document.getElementById('homeLink');
            if (homeLink) {
                log('✅ homeLink encontrado: ' + homeLink.tagName);
                homeLink.click();
                log('✅ Click ejecutado en homeLink');
            } else {
                log('❌ homeLink NO ENCONTRADO');
            }
        }
        
        function testStartTrading() {
            log('🔍 Probando startTradingBtn...');
            const startTradingBtn = document.getElementById('startTradingBtn');
            if (startTradingBtn) {
                log('✅ startTradingBtn encontrado: ' + startTradingBtn.tagName);
                startTradingBtn.click();
                log('✅ Click ejecutado en startTradingBtn');
            } else {
                log('❌ startTradingBtn NO ENCONTRADO');
            }
        }
        
        function testLoginLink() {
            log('🔍 Probando loginLink...');
            const loginLink = document.getElementById('loginLink');
            if (loginLink) {
                log('✅ loginLink encontrado: ' + loginLink.tagName);
                loginLink.click();
                log('✅ Click ejecutado en loginLink');
            } else {
                log('❌ loginLink NO ENCONTRADO');
            }
        }
        
        // Cargar la página principal en un iframe para probar
        log('🚀 Cargando página principal...');
        const iframe = document.createElement('iframe');
        iframe.src = '/';
        iframe.style.width = '100%';
        iframe.style.height = '600px';
        iframe.style.border = '1px solid #ccc';
        document.body.appendChild(iframe);
        
        iframe.onload = function() {
            log('✅ Página principal cargada en iframe');
            
            // Intentar acceder a los elementos del iframe
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                const homeLink = iframeDoc.getElementById('homeLink');
                const startTradingBtn = iframeDoc.getElementById('startTradingBtn');
                const loginLink = iframeDoc.getElementById('loginLink');
                
                log('🔍 Elementos en iframe:');
                log('homeLink: ' + (homeLink ? '✅' : '❌'));
                log('startTradingBtn: ' + (startTradingBtn ? '✅' : '❌'));
                log('loginLink: ' + (loginLink ? '✅' : '❌'));
                
            } catch (error) {
                log('❌ Error accediendo al iframe: ' + error.message);
            }
        };
    </script>
</body>
</html>
