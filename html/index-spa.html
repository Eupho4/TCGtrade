<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCGtrade - Intercambio Pokémon TCG</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎴</text></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'dark-bg': '#1a1a1a',
                        'dark-card': '#2d2d2d',
                        'dark-text': '#ffffff',
                        'dark-text-secondary': '#a0a0a0'
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <!-- Main App Container -->
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <div id="app-header"></div>
        
        <!-- Main Content -->
        <main id="app-content" class="flex-1 container mx-auto px-4 py-8">
            <!-- Loading State -->
            <div class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500"></div>
                <p class="mt-4 text-gray-600 dark:text-gray-400">Cargando...</p>
            </div>
        </main>
        
        <!-- Footer -->
        <div id="app-footer"></div>
    </div>
    
    <!-- Route Loading Indicator (hidden by default) -->
    <div id="route-loader" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500"></div>
        </div>
    </div>
    
    <!-- Modals Container -->
    <div id="modals-container">
        <!-- Authentication Modal -->
        <div id="authModal" class="auth-modal-overlay">
            <div class="auth-modal-content">
                <button data-close-modal class="auth-modal-close">&times;</button>
                
                <!-- Login Form -->
                <div id="loginForm" class="auth-form">
                    <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">
                        <span class="icon">🔑</span> Iniciar Sesión
                    </h2>
                    <form>
                        <div class="mb-4">
                            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2">
                                Email
                            </label>
                            <input type="email" required
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                        </div>
                        <div class="mb-6">
                            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2">
                                Contraseña
                            </label>
                            <input type="password" required
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                        </div>
                        <button type="submit" class="w-full btn-primary py-2 px-4 rounded-lg font-semibold">
                            Iniciar Sesión
                        </button>
                    </form>
                    <div class="mt-4 text-center">
                        <p class="text-gray-600 dark:text-gray-400">
                            ¿No tienes cuenta? 
                            <span class="auth-form-toggle" onclick="showAuthModal('register')">
                                Regístrate aquí
                            </span>
                        </p>
                        <p class="mt-2">
                            <span class="auth-form-toggle" onclick="showAuthModal('forgot')">
                                ¿Olvidaste tu contraseña?
                            </span>
                        </p>
                    </div>
                </div>
                
                <!-- Register Form -->
                <div id="registerForm" class="auth-form hidden">
                    <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">
                        <span class="icon">📝</span> Crear Cuenta
                    </h2>
                    <form>
                        <div class="mb-4">
                            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2">
                                Nombre de Usuario
                            </label>
                            <input type="text" name="username" required
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2">
                                Email
                            </label>
                            <input type="email" required
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2">
                                Contraseña
                            </label>
                            <input type="password" required
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                        </div>
                        <div class="mb-6">
                            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2">
                                Confirmar Contraseña
                            </label>
                            <input type="password" name="confirmPassword" required
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                        </div>
                        <button type="submit" class="w-full btn-primary py-2 px-4 rounded-lg font-semibold">
                            Crear Cuenta
                        </button>
                    </form>
                    <div class="mt-4 text-center">
                        <p class="text-gray-600 dark:text-gray-400">
                            ¿Ya tienes cuenta? 
                            <span class="auth-form-toggle" onclick="showAuthModal('login')">
                                Inicia sesión aquí
                            </span>
                        </p>
                    </div>
                </div>
                
                <!-- Forgot Password Form -->
                <div id="forgotPasswordForm" class="auth-form hidden">
                    <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">
                        <span class="icon">🔒</span> Recuperar Contraseña
                    </h2>
                    <form>
                        <div class="mb-6">
                            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2">
                                Email
                            </label>
                            <input type="email" required
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                            <p class="text-sm text-gray-600 dark:text-gray-400 mt-2">
                                Te enviaremos un enlace para restablecer tu contraseña
                            </p>
                        </div>
                        <button type="submit" class="w-full btn-primary py-2 px-4 rounded-lg font-semibold">
                            Enviar Email de Recuperación
                        </button>
                    </form>
                    <div class="mt-4 text-center">
                        <span class="auth-form-toggle" onclick="showAuthModal('login')">
                            Volver al inicio de sesión
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- JavaScript Modules -->
    <script type="module" src="../js/app-spa.js"></script>
</body>
</html>
